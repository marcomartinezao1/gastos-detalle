<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f6e4f">
<title>Registro de Gastos – DETALLE</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"></script>
<style>
  :root{ --verde:#0f6e4f; --verde2:#0d5c42; --bg:#f3f5f4; --card:#fff; --bord:#d8dddb; --txt:#1c2421; --mut:#6a756f; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Segoe UI',Roboto,system-ui,Arial,sans-serif; background:var(--bg); color:var(--txt); }
  header{ background:var(--verde); color:#fff; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:5; }
  header h1{ font-size:17px; margin:0; font-weight:600; }
  #who{ font-size:12px; opacity:.85; }
  .wrap{ max-width:560px; margin:0 auto; padding:16px; }
  .card{ background:var(--card); border:1px solid var(--bord); border-radius:14px; padding:18px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  label{ display:block; font-size:13px; font-weight:600; margin:14px 0 6px; color:var(--txt); }
  label .opt{ font-weight:400; color:var(--mut); }
  input,select{ width:100%; padding:13px 12px; font-size:16px; border:1px solid var(--bord); border-radius:10px; background:#fff; color:var(--txt); }
  input:focus,select:focus{ outline:none; border-color:var(--verde); box-shadow:0 0 0 3px rgba(15,110,79,.15); }
  .row{ display:flex; gap:12px; } .row>div{ flex:1; }
  button{ width:100%; padding:15px; font-size:16px; font-weight:700; border:none; border-radius:12px; background:var(--verde); color:#fff; margin-top:22px; cursor:pointer; }
  button:active{ background:var(--verde2); }
  button:disabled{ opacity:.6; }
  .ghost{ background:#fff; color:var(--verde); border:1px solid var(--verde); }
  #msg{ padding:13px; border-radius:10px; margin-top:14px; font-size:14px; display:none; }
  .ok{ background:#e6f4ee; color:#0f6e4f; border:1px solid #b7e0cd; }
  .err{ background:#fdecec; color:#b3261e; border:1px solid #f3c2bf; }
  .info{ background:#eef3ff; color:#1a47a6; border:1px solid #c3d3f5; }
  #login{ text-align:center; padding:40px 16px; }
  #login p{ color:var(--mut); font-size:14px; }
  .hide{ display:none!important; }
  .spin{ display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:r .7s linear infinite; vertical-align:-3px; margin-right:8px; }
  @keyframes r{ to{ transform:rotate(360deg);} }
</style>
</head>
<body>
<header>
  <h1>Registro de Gastos</h1>
  <span id="who"></span>
</header>
<div class="wrap">

  <div id="login" class="card">
    <p>Inicia sesión con tu cuenta Microsoft (la de tu OneDrive) para registrar gastos en la hoja DETALLE.</p>
    <button id="btnLogin">Iniciar sesión</button>
  </div>

  <div id="app" class="card hide">
    <form id="form">
      <div class="row">
        <div>
          <label>FECHA</label>
          <input type="date" id="fecha" required>
        </div>
        <div>
          <label>CORRIDA</label>
          <input type="number" id="corrida" inputmode="numeric" step="1" required>
        </div>
      </div>

      <label>CANTIDAD</label>
      <input type="number" id="cantidad" inputmode="decimal" step="any" required>

      <label>CONCEPTO</label>
      <input type="text" id="concepto" list="conceptos" autocomplete="off" required>
      <datalist id="conceptos"></datalist>

      <label>BENEFICIARIO</label>
      <select id="beneficiario" required>
        <option value="" disabled selected>Elige…</option>
      </select>

      <label>CAJA</label>
      <select id="caja" required>
        <option value="" disabled selected>Elige…</option>
      </select>

      <label>ESTADO</label>
      <select id="estado" required></select>

      <label>DETALLE <span class="opt">(opcional)</span></label>
      <input type="text" id="detalle" autocomplete="off">

      <button type="submit" id="btnSave">Guardar registro</button>
    </form>
    <div id="msg"></div>
    <button class="ghost" id="btnLogout" style="margin-top:10px;">Cerrar sesión</button>
  </div>

</div>

<script>
// ===================== CONFIG (se completa en el registro de Azure) =====================
const CLIENT_ID = "4ea3f650-5e83-444c-97bb-cf92116fb929";          // <-- ID de aplicación (Azure)
const FILE_PATH = "/LEPABI/GASTOS.xlsx";      // ruta dentro de tu OneDrive
const TABLE     = "Table1";                    // tabla de la hoja DETALLE
// =======================================================================================

const BENEFICIARIOS = ["BANCO","MARCO","GABY","LEPABI","PICHINCHA","BOLIVARIANO","TC","EVENTUALES"];
const CAJAS         = ["COMIDA","ALMUERZOS","SP","EVENTUALES","LEPABI","PRESTAMO"];
const ESTADOS       = ["PENDIENTE","CANCELADO"];
const CONCEPTOS     = ["PAN","ALMUERZOS","CENAS","DESAYUNO","COMIDA","GASOLINA","DIESEL","MOVILIZACION","COMISARIATO","SIEMBRA","PLASTICOS","FACTURAS","EVENTUALES","VARIOS","TARJETA DE CREDITO","ENCEBOLLADOS","EMASA","SUPER AKI"];

// rellenar selects
const $ = id => document.getElementById(id);
BENEFICIARIOS.forEach(v=>$("beneficiario").add(new Option(v,v)));
CAJAS.forEach(v=>$("caja").add(new Option(v,v)));
ESTADOS.forEach(v=>$("estado").add(new Option(v,v)));
CONCEPTOS.forEach(v=>$("conceptos").appendChild(new Option(v,v)));
$("fecha").value = new Date().toISOString().slice(0,10);

// MSAL
const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: "https://login.microsoftonline.com/consumers",
    redirectUri: "https://marcomartinezao1.github.io/gastos-detalle/"
  },
  cache: { cacheLocation: "localStorage" }
};
const SCOPES = ["User.Read","Files.ReadWrite"];
const pca = new msal.PublicClientApplication(msalConfig);
let account = null;

function show(t,cls){ const m=$("msg"); m.textContent=t; m.className=cls; m.style.display="block"; }
function hideMsg(){ $("msg").style.display="none"; }

async function init(){
  try{
    const resp = await pca.handleRedirectPromise();
    if(resp && resp.account){ account = resp.account; }
    else { const a = pca.getAllAccounts(); if(a.length) account = a[0]; }
  }catch(e){ console.error(e); }
  renderAuth();
}
function renderAuth(){
  if(account){
    $("login").classList.add("hide");
    $("app").classList.remove("hide");
    $("who").textContent = account.username || "";
  }else{
    $("login").classList.remove("hide");
    $("app").classList.add("hide");
    $("who").textContent = "";
  }
}
$("btnLogin").onclick = () => pca.loginRedirect({ scopes: SCOPES });
$("btnLogout").onclick = () => pca.logoutRedirect();

async function token(){
  try{
    const r = await pca.acquireTokenSilent({ scopes: SCOPES, account });
    return r.accessToken;
  }catch(e){
    await pca.acquireTokenRedirect({ scopes: SCOPES, account });
  }
}
async function gfetch(url, opt={}){
  const t = await token();
  opt.headers = Object.assign({ "Authorization":"Bearer "+t, "Content-Type":"application/json" }, opt.headers||{});
  const r = await fetch("https://graph.microsoft.com/v1.0"+url, opt);
  if(!r.ok){ const tx = await r.text(); throw new Error(r.status+" "+tx); }
  return r.status===204 ? null : r.json();
}

// localizar el archivo (por ruta; si falla, por búsqueda)
let fileId = null;
async function resolveFile(){
  if(fileId) return fileId;
  try{
    const it = await gfetch("/me/drive/root:"+FILE_PATH);
    fileId = it.id; return fileId;
  }catch(e){
    const s = await gfetch("/me/drive/root/search(q='GASTOS.xlsx')");
    const hit = (s.value||[]).find(x=>/GASTOS\.xlsx$/i.test(x.name));
    if(!hit) throw new Error("No encontré GASTOS.xlsx en tu OneDrive.");
    fileId = hit.id; return fileId;
  }
}

// fecha -> número de serie de Excel (días desde 1899-12-30)
function excelSerial(yyyy_mm_dd){
  const [y,m,d] = yyyy_mm_dd.split("-").map(Number);
  const ms = Date.UTC(y, m-1, d) - Date.UTC(1899, 11, 30);
  return Math.round(ms / 86400000);
}

$("form").onsubmit = async (ev) => {
  ev.preventDefault();
  hideMsg();
  const btn = $("btnSave");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Guardando…';
  try{
    const row = [
      excelSerial($("fecha").value),
      Number($("corrida").value),
      Number($("cantidad").value),
      $("concepto").value.trim().toUpperCase(),
      $("beneficiario").value,
      $("caja").value,
      $("estado").value,
      $("detalle").value.trim()
    ];
    const id = await resolveFile();
    await gfetch("/me/drive/items/"+id+"/workbook/tables/"+TABLE+"/rows/add",{
      method:"POST",
      body: JSON.stringify({ values: [row] })
    });
    show("✅ Registro guardado en DETALLE.","ok");
    // limpiar (conservando fecha)
    $("corrida").value=""; $("cantidad").value=""; $("concepto").value="";
    $("beneficiario").selectedIndex=0; $("caja").selectedIndex=0;
    $("estado").value="PENDIENTE"; $("detalle").value="";
    $("corrida").focus();
  }catch(e){
    show("❌ Error: "+e.message,"err");
  }finally{
    btn.disabled=false; btn.textContent="Guardar registro";
  }
};

if(CLIENT_ID.indexOf("__")===0){
  show("Falta configurar el CLIENT_ID de Azure en el código.","info");
}
init();
</script>
</body>
</html>
